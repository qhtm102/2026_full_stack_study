<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRADE</title>
</head>
<body>
    
    <form>

        <div>
            <input type="text" name="kor" placeholder="국어 점수 입력">
        </div>
        <div>
            <input type="text" name="eng" placeholder="영어 점수 입력">
        </div>
        <div>
            <input type="text" name="math" placeholder="수학 점수 입력">
        </div>
        
        <input type="submit" value="결과">
        
        <div>
            

        </div>


    </form>


    <script>

        let score1, score2, score3;
        
        let total = score1 + score2 + score3;
        let average = Math.round(total / 3);

        // console.log(total, average);

        let grade;
        if (average >= 90) {
            grade = 'A';
        }
        else if (average >= 80) {
            grade = 'B';
        }
        else if (average >= 70) {
            grade = 'C';
        }
        else if (average >= 60) {
            grade = 'D';
        }
        else {
            grade = 'F';
        }
    </script>
</body>
</html>
