<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUGUDAN</title>
</head>
<body>
    <h2>구구단</h2>

    <script>
        for(let i = 2; i < 10; i++) {
            
            document.write(`<div style='float:left; margin:8px'>`);
            for (let j = 1; j < 10; j++) {
                document.write(`<p> ${i} X ${j} = ${i*j} </p>`);
                
            }
            document.write(`</div>`);

        }
    </script>
</body>
</html>
