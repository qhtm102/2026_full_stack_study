<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grade js test</title>
</head>
<body>
        
    <script>
        // 0 ~ 100 사이의 정수 3개를 랜덤하게 추출해서 변수에 저장
        // 변수 이름은 각각 score1, score2, score3
        // 총점, 평균 계산해서 각각 변수에 저장 (total, average)
        // 평균 기준등급을 계산해서 변수에 저장 (grade) if-else 사용
        // 총점 평균 등급 출력

        let score1, score2, score3;
        score1 = Math.round(Math.random() * 100);
        score2 = Math.round(Math.random() * 100);
        score3 = Math.round(Math.random() * 100);

        // console.log(score1, score2, score3);

        let total = score1 + score2 + score3;
        let average = Math.round(total / 3);

        // console.log(total, average);

        let grade;
        if(average >= 90) {
            grade = 'A';
        }
        else if(average >= 80) {
            grade = 'B';
        }
        else if(average >= 70) {
            grade = 'C';
        }
        else if(average >= 60) {
            grade = 'D';
        }
        else {
            grade = 'F';
        }


        document.write(`<h1 style="text-align:center"> [ 총점: ${total}, 평균: ${average}, 학점: ${grade} ] </h1>`)
        console.log(`총점: ${total}, 평균: ${average}, 학점: ${grade}`);

    </script>
</body>
</html>
