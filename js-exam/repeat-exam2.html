<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Star Tower </title>
</head>
<body>
    

    <script>
        for(let i=1; i< 6; i++) {
            document.write('*');
            for(let j=2; j<=i; j++) {
                document.write('*');
            }
            document.write('<br>');
        }

    </script>
</body>
</html>
