<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="Stylesheet" href="menus.css">
</head>
<body>
    <div id="button_bar">
        <table align="center">
            <tr id="btns">
                <td id="type_thriller"><img>스릴러</td>
                <td id="type_sf"><img>SF</td>
                <td id="type_animation"><img>애니메이션</td>
            </tr>
        </table>
    </div>

    <div id="slide_image">
        <img src="images/0.jpg">
    </div>
    <div id="timers"></div>

    <script>
        document.addEventListener('DOMContentLoaded', (event)=>{
            const timers = document.querySelector('#timers');
            
            const images = document.querySelector('#slide_image img');
            let currentPosition = 0;
            const imageList = ['0', '1', '2', '3', '4'];

            window.setInterval(function(){
                timers.innerHTML = `<h2 style='text-align:center;'>${new Date().toLocaleTimeString()}</h2>`;
            }, 1000);

            //////////////////////////////////////////

            // 이미지 슬라이드
            window.setInterval(function(){
                currentPosition++;
                if(currentPosition > imageList.length-1){
                    currentPosition = 0;
                }
                images.src = `images/${currentPosition}.jpg`;
            }, 5000);

            //////////////////////////////////////////

            // 화면 이동 버튼
            const btns = document.querySelectorAll('#btns td'); 
            for(let i=0; i<btns.length; i++) {
                btns[i].addEventListener('click', (event)=>{
                    location.href='animation-list.html';
                });
            }

            
        
        
        });

            
        

    </script>
</body>
</html>
