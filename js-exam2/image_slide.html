<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div id="image_slide"><img src="images/0.jpg"></div>
    <script>
        document.addEventListener('DOMContentLoaded', (event)=>{
            const imgs = document.querySelector('#image_slide img');
            imgs.src = `images/0.jpg`;
            let currnetPosition = 0;
            const images = ['0', '1', '2', '3', '4'];
            
            window.setInterval(function(){
                currnetPosition++;
                if(currnetPosition > images.length - 1) {
                    currnetPosition = 0;
                }
                imgs.src=`images/${currnetPosition}.jpg`;
            },5000);

        });
    </script>
</body>
</html>
