<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .yugioh-card {
            width: 350px;
            padding: 12px;
            border: 10px solid #8a5a2b;
            border-radius: 10px;
            background: linear-gradient(#d9b87d, #c49a5a);
            box-sizing: border-box;
            font-family: serif;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 22px;
            padding: 5px;
            border: 2px solid #333;
            background: #dcbf74;
            /* background: 3rgb(red, green, blue); */
        }

        .card-image {
            margin: 10px 0;
            height: 320px;
            border: 2px solid #333;
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-type {
            border: 1px solid #333;
            padding: 4px;
            font-weight: bold;
            background: #f7f0d5;
        }

        .card-description {
            margin-top: 6px;
            min-height: 120px;
            padding: 8px;
            border: 1px solid #333;
            background: #fdf9e9;
            white-space: pre-wrap;
        }

        .card-info {
            margin-top: 8px;
        }

        .card-stats {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    
    <div id="msg"></div>
    <script>
        window.addEventListener('load', (event)=>{
            const msgDiv = document.querySelector('#msg');

            const url = 'https://db.ygoprodeck.com/api/v7/cardinfo.php?name=Tornado%20Dragon';
            const options = {
                method: 'GET',
                headers: {
                    accept: 'application/json',
                }
            };

            fetch(url, options)
            .then(response => response.json())
            .then( json=> {
                console.log(json.data[0]);
                const cardData = json.data[0];
                const name = cardData.name
                const atk = cardData.atk
                const def = cardData.def
                const attribute = cardData.attribute
                const desc = cardData.desc
                const frameType = cardData.frameType
                const level = cardData.level
                const humanReadableCardType = cardData.humanReadableCardType
                

                // msgDiv.innerHTML = `
                //     <h2>${name}</h2>
                //     <h3>${atk}</h3>
                //     <h3>${def}</h3>
                //     <h3>${attribute}</h3>
                //     <h3>${desc}</h3>
                //     <h3>${frameType}</h3>
                //     <h3>${level}</h3>
                //     <h3>${humanReadableCardType}</h3>
                // `;
                msgDiv.innerHTML = `
                    <div class="yugioh-card">
                        <div class="card-header">
                            <span class="card-name">${name}</span>
                           
                        </div>
                        <div class="card-info">
                            <span><strong>속성</strong> : ${attribute}</span>
                            <span class="card-level">⭐ ${level ?? ""}</span>
                        </div>

                        <div class="card-image">
                            <!-- 이미지가 있다면 img 태그를 넣으면 됩니다 -->
                            <!-- <img src="" alt="${name}"> -->
                        </div>

                        <div class="card-type">
                            [${humanReadableCardType}] / ${frameType}
                        </div>

                        <div class="card-description">
                            ${desc}
                        </div>

                        <div class="card-stats">
                            <span>ATK / ${atk ?? "-"}</span>
                            <span>DEF / ${def ?? "-"}</span>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
