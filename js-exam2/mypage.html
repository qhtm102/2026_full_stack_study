<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genre</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    color:white;
    padding:20px;
}

.card{
    width:850px;
    max-width:100%;
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.05);
    animation:showUp 1s ease;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
}

p{
    line-height:1.8;
    color:#ddd;
    margin-bottom:25px;
}

.movie-list{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.movie{
    flex:1;
    min-width:180px;
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}

.movie:hover{
    transform:translateY(-10px);
}

.back{
    display:inline-block;
    margin-top:30px;
    text-decoration:none;
    color:white;
    padding:12px 25px;
    border-radius:10px;
    background:#222;
}

@keyframes showUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1 id="title"></h1>
    <p id="description"></p>

    <div class="movie-list" id="movies"></div>

    <a href="index.html" class="back">← 메인으로</a>
</div>

<script>

const params = new URLSearchParams(location.search);
const genre = params.get("genre");

const data = {

animation:{
title:"🎨 애니메이션",
description:"상상력을 현실로 만드는 장르입니다. 아름다운 작화와 감동적인 이야기로 모든 연령층이 즐길 수 있습니다.",
movies:["센과 치히로의 행방불명","토이 스토리","겨울왕국"]
},

sf:{
title:"🚀 SF",
description:"미래 기술, 우주 탐험, 인공지능 등 과학적 상상력을 바탕으로 한 장르입니다.",
movies:["인터스텔라","아바타","마션"]
},

thriller:{
title:"🔪 스릴러",
description:"긴장감과 반전을 중심으로 관객의 몰입을 극대화하는 장르입니다.",
movies:["세븐","셔터 아일랜드","겟 아웃"]
}

};

const title = document.getElementById("title");
const description = document.getElementById("description");
const movies = document.getElementById("movies");

if(data[genre]){

title.textContent = data[genre].title;
description.textContent = data[genre].description;

data[genre].movies.forEach(movie=>{
    movies.innerHTML += `
    <div class="movie">
        <h3>${movie}</h3>
    </div>
    `;
});

if(genre==="animation"){
    title.style.color="#ff7ee5";
}
else if(genre==="sf"){
    title.style.color="#00c6ff";
}
else{
    title.style.color="#ff2e63";
}
}
</script>

</body>
</html>
