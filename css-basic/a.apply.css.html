<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css 적용 연습</title>
    
    <!-- 스타일 적용방식 3. 외부 파일에 정의된 스타일 사용 -->
    <link rel="Stylesheet" href="my-style.css">

    <!-- 스타일 적용방식 2. <head> 태그 내부, <style> 태그에 구현 -->
    <style>
        h2 { 
                color:blue; 
                text-align: center; 
                /* css 주석 */
                /* text-decoration: underline;  */
            }
        h3 {
                color:purple
            }
    </style>

</head>

<body>

    <!-- 스타일 적용방식 1. HTML 태그에 직접 적용 : style 태그 사용 -->
    <p style="color:red; font-size: 23pt;">스타일이 적용된 요소</p>

    <h2> 스타일이 적용된 요소 2</h2>
    <h2> 스타일이 적용된 요소 2</h2>

    <div>스타일이 적용된 요소 3</div>

    <h3>어떤 스타일이 적용될까요</h3>

</body>

</html>
