<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 메인페이지</title>
    <style>
        body {
            min-height: 100vh;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .genre-container {
            width: 1200px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .genre-card {
            width: 350px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .genre-card:hover {
            transform: translateY(-10px) scale(1.03);
            background: rgba(255, 255, 255, 0.1);
        }

        .genre-card img {
            width: 100%;
            height: 500px;
            object-fit: cover;
        }

        .genre-name {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="title" style="margin-bottom: 40px;">
        <h1>장르별 영화 소개</h1>
    </div>

    <div class="genre-container">

        <div class="genre-card" onclick="location.href='sf-list.html'">
            <div id="sf"></div>
            <div class="genre-name">SF</div>
        </div>

        <div class="genre-card" onclick="location.href='thriller-list.html'">
            <div id="th"> </div>
            <div class="genre-name">스릴</div>
        </div>

        <div class="genre-card" onclick="location.href='animation-list.html'">
            <div id="co"></div>
            <div class="genre-name">코미디</div>
        </div>

    </div>
  
    <div id="timer"></div>
    
    <script>
        window.addEventListener('load',function(event){
            const ONE_SECONDE = 1000;
            const timers = document.querySelector('#timer');
            timers.innerHTML = `<h3>[${new Date().toLocaleDateString()}]</h3>`
            
            window.setInterval(
                function() {

                    timers.innerHTML = `<h3>[${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}]</h3>`
                }, ONE_SECONDE
            );
               
            const sfImg = document.querySelector('#sf');
            const thImg = document.querySelector('#th');
            const coImg = document.querySelector('#co');

            const options = {
                method: 'GET',
                headers: {
                    accept: 'application/json',
                    Authorization: 'Bearer eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIyZGQwZmM2OTZkMDQyZjkwODFmNDJhZDU2YzFlM2FhMSIsIm5iZiI6MTc4MjM0NTkxOS40MDQsInN1YiI6IjZhM2M3MGJmODIwYjZhZjQ5NzY2M2RmOSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.TFyFJd98YK3-_nxxK29CJZFNBfXpUtlFT4yGjTcqf7Y'
                }
            };
                //sf 이미지
                fetch('https://api.themoviedb.org/3/discover/movie?with_genres=878&sort_by=popularity.desc&language=ko-KR&page=1',options)
                .then(response => response.json())
                .then(json => {

                    const movie = json.results[0];
                    sfImg.innerHTML +=
                        `<img src="https://image.tmdb.org/t/p/w200${movie.poster_path}" alt="${movie.title}" >`;
                });

                // 스릴러 이미지
                fetch('https://api.themoviedb.org/3/discover/movie?with_genres=53&sort_by=popularity.desc&language=ko-KR&page=1', options)
                .then(response => response.json())
                .then(json => {
                    const movie = json.results[0];
                    thImg.innerHTML = 
                        `<img src="https://image.tmdb.org/t/p/w200${movie.poster_path}" alt="${movie.title}">`;
                });

                
                //코미디 이미지
                fetch('https://api.themoviedb.org/3/discover/movie?with_genres=35&sort_by=popularity.desc&language=ko-KR&page=1',options)
                .then(response => response.json())
                .then(json => {
                    const movie = json.results[0];
                    coImg.innerHTML =
                        `<img src="https://image.tmdb.org/t/p/w200${movie.poster_path}" alt="${movie.title}" >`;
                });
        })
    </script>
</body>

</html>
