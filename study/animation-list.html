<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
      body{
    background-color: #0f172a;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    }

    /* 장르명 */
    #genre_name{
        width: 300px;
        height: 150px;
        margin: 0 auto;

        display: flex;
        justify-content: center;
        align-items: center;

        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        color: white;

        border-radius: 25px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* 장르 설명 */
    #genre_explain{
        margin: 20px auto;
        padding: 20px;

        text-align: center;

        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);

        color: #ddd;

        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* 영화 목록을 2열(Grid)로 배치 */
    #movie-divs{
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
        margin-top: 30px;
    }

    /* 영화 카드 */
    .movie-card{
        padding: 20px;

        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);

        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);

        text-align: center;
        transition: 0.3s;
    }

    .movie-card:hover{
        transform: translateY(-5px);
    }

    .movie-card img{
        width: 100%;
        max-width: 300px;
        height: 300px;
        object-fit: cover;
        border-radius: 15px;
        margin-bottom: 15px;
    }

    /* 이전 버튼 */
    #back-btn{
        width: 120px;
        height: 40px;

        border: none;
        border-radius: 10px;

        background: rgba(255,255,255,0.08);
        color: white;
        text-align: center;
        cursor: pointer;
        padding-top: 10px;
    }

    #popular_rate {
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;

    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);

    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}

    #popular_rate h4 {
        margin: 10px 0;
        padding: 12px 16px;

        background: rgba(255, 255, 255, 0.08);
        border-radius: 12px;

        color: white;
        font-weight: normal;
        transition: 0.2s;
    }

    #popular_rate h4:hover {
        transform: translateX(5px);
    }

    #lot, #cgv{
        width: 100px;
        height: 40px;
        border-radius: 12px;
        padding-top : 10px;
        text-align: center;
        background-color: rgba(255,255,255,0.05);
    }
   
    </style>
</head>
<body>
    <div id="back-btn">메인페이지</div>
    <div id="genre_name">
        
        <h1 style="text-align: center;">코미디<br>(Comedy)</h1>
        
    </div>

     <br>

    <div id="theater">
        <h4>영화 예매하러 가기</h4>
        <div id="lot">롯데시네마</div>
        <br>
        <div id="cgv">CGV</div>
    </div>

    <div id="genre_explain">
        
        <h3>코미디 영화 는 유머를 강조하는 영화 장르 입니다 . 이러한 영화는 관객을 즐겁게 하고 웃게 하기 위해 제작됩니다. <br>
            이 장르의 영화는 일반적으로 해피엔딩 으로 끝나지만, 블랙 코미디는 예외입니다. <br>
            코미디는 영화 장르 중 가장 오래된 장르 중 하나이며, 고전 연극 코미디에서 유래했습니다 . </h3>
    </div>

    <br>
    <div id="movie-divs"></div>
    <br>
    <div id="popular_rate"></div>

    <script>
        window.addEventListener('load', (event)=>{
            const IMAGE_PATH = 'https://image.tmdb.org/t/p/original/';

            const backBtn = document.querySelector('#back-btn');

            backBtn.addEventListener('click', (event) => {
                location.href='main.html';
            });

            const btnLot = document.querySelector('#lot');
            const cgvLot = document.querySelector('#cgv');

            btnLot.addEventListener('click', (event) => {
                location.href = "https://www.lottecinema.co.kr/NLCHS?referrer=https://www.google.com/";
            });

            cgvLot.addEventListener('click', (event)=> {
                location.href = "https://cgv.co.kr/";
            });

            const TMDB_ACCESS_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIyZGQwZmM2OTZkMDQyZjkwODFmNDJhZDU2YzFlM2FhMSIsIm5iZiI6MTc4MjM0NTkxOS40MDQsInN1YiI6IjZhM2M3MGJmODIwYjZhZjQ5NzY2M2RmOSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.TFyFJd98YK3-_nxxK29CJZFNBfXpUtlFT4yGjTcqf7Y';
            // const URL = 'https://api.themoviedb.org/3/movie/popular?language=en-US&page=1';
            const URL = 'https://api.themoviedb.org/3/discover/movie?with_genres=35&sort_by=popularity.desc&language=ko-KR&page=1';
            const options = {
                method: 'GET',
                headers: {
                    accept: 'application/json',
                    Authorization: `Bearer ${TMDB_ACCESS_TOKEN}`
                }
            };

            fetch(URL, options)
                    .then(response => response.json())  // then 앞의 작업이 끝나면 실행될 코드 지정, respones.json() : 응답을 json으로 변환
                    .then(json => {
                        console.log(json);
                        for(let i=0; i<json.results.length; i++){
                            const movie = json.results[i];
                            
                            const title = movie.title;
                            const overview = movie.overview;
                            const poster = IMAGE_PATH + movie.poster_path;
                            const release_date = movie.release_date;
                            const popularity = movie.popularity;
                            const vote_average = movie.vote_average;
                            const id = movie.id;
                            
                            if(overview == "") {
                                continue;
                            }
                            
                            const movieDiv = document.querySelector('#movie-divs');
                            movieDiv.innerHTML += 
                            `
                            <div class="movie-card" style="border-radius: 20px; padding:10px; border: 1px solid black">
                                <a href = "movie-detail.html?id=${id}"><img src=${poster} width='400px' height='500px'></a></img>
                                <h3>${title}</h3>
                                <p> ${overview}</p>
                                <h4>상영일: ${release_date}</h4>
                                <h4>평점: ${Math.floor(vote_average)}</h4>
                            </div>
                            `

                            const popular = document.querySelector('#popular_rate');
                            popular.innerHTML += 
                            `
                                <h4> [${title}]  인기도 : ${popularity} </h4>
                            `
                        }
                    });

        });

    </script>
</body>
</html>
