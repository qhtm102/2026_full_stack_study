<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 상세 페이지</title>
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    background: #0f172a;
    color: white;
    padding: 30px;
}

/* 전체 레이아웃 */
#container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 30px;
    align-items: flex-start;
}

/* 영화관 */
#theater {
    width: 220px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 30px;
}

#theater h4 {
    color: #60a5fa;
    margin-bottom: 20px;
    font-size: 1.2rem;
}

#lot,
#cgv {
    padding: 15px;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

#lot:hover,
#cgv:hover {
    background: #2563eb;
    border-color: #60a5fa;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(37,99,235,.35);
}

/* 영화 정보 */
#message {
    flex: 1;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 35px;
}

h3 {
    margin-bottom: 25px;
    padding-bottom: 18px;
    border-bottom: 2px solid rgba(255,255,255,0.15);
    color: #60a5fa;
    font-size: 2rem;
}

h5 {
    margin-top: 18px;
    padding: 18px;
    background: rgba(255,255,255,0.08);
    border-left: 5px solid #60a5fa;
    border-radius: 12px;
    font-size: 1rem;
    line-height: 1.8;
    font-weight: normal;
    transition: 0.3s;
}

h5:hover {
    background: rgba(37,99,235,0.15);
}

strong {
    color: #93c5fd;
}

a {
    color: #60a5fa;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>
    <div id="container">

        <div id="theater">
            <h4>영화 예매하러 가기</h4>
            <div id="lot">롯데시네마</div>
            <div id="cgv">CGV</div>
        </div>

        <div id="message"></div>

    </div>
    <script>
        window.addEventListener('load', function (event) {
const btnLot = document.querySelector('#lot');
            const cgvLot = document.querySelector('#cgv');

            btnLot.addEventListener('click', (event) => {
                location.href = "https://www.lottecinema.co.kr/NLCHS?referrer=https://www.google.com/";
            });

            cgvLot.addEventListener('click', (event)=> {
                location.href = "https://cgv.co.kr/";
            });
            const div = document.querySelector('#message');
            const qs = new URLSearchParams(window.location.search);
            const id = qs.get('id');
            // alert(window.location.href);
            // alert(window.location.search);
            // const id = location.search.split('=')[1];

            const options = {
                method: 'GET',
                headers: {
                    accept: 'application/json',
                    Authorization: 'Bearer eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIyZGQwZmM2OTZkMDQyZjkwODFmNDJhZDU2YzFlM2FhMSIsIm5iZiI6MTc4MjM0NTkxOS40MDQsInN1YiI6IjZhM2M3MGJmODIwYjZhZjQ5NzY2M2RmOSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.TFyFJd98YK3-_nxxK29CJZFNBfXpUtlFT4yGjTcqf7Y'
                }
            };

            fetch(`https://api.themoviedb.org/3/movie/${id}?language=ko-KR&page=1`, options) //한글버전 = {}?language=ko-KR&page
                .then(response => response.json())
                .then(json => {
                    console.log(json);
                    let genres = "";

                    json.genres.forEach((genre) => {
                        genres += genre.name + " , ";
                    });
                    
                    div.innerHTML = `<h3>제목:${json.title}</h3>`;
                    div.innerHTML += `<h5>줄거리:${json.overview}</h5>`;
                    div.innerHTML += `<h5>장르: ${genres}</h5>`;
                    div.innerHTML += `<h5>개봉일:${json.release_date}</h5>`;
                    div.innerHTML += `<h5>평점:${Math.floor(json.vote_average)}</h5>`;
                    div.innerHTML += `<h5>인기도:${json.popularity}</h5>`;


                })

        });
    </script

</body>

</html>
