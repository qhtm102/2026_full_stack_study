<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       td{
            width: 100px;
            height: 100px;
            border: solid 2px;
        }
    </style>
</head>
<body>
    <table>
        <tr id="colors-tr">       
        </tr>
        <tr>
            <td id="canvas" colspan="8" style="width: 100%; height: 300px;">
            </td>
        </tr>
        <tr>
            <td colspan="8" id="message"></td>
        </tr>

    </table>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(function() {
            const canvas = $('#canvas');
            const colors = ['red', 'orange', 'yellow', 'green', 'blue', 'navy', 'purple', 'random'];
            const colorsTr = $('#colors-tr');
            colors.forEach(function(color, idx) {
                const td =  $('<td></td>').css('background-color', color)
                                          .attr('id', color);

                // td.on('mouseover', function(event){
                //     canvas.css('background-color', $(event.target).css('background-color'));
                // }).on('mouseleave', function(event){
                //     canvas.css('background-color', '');
                // });
                
                td.on({
                    'mouseover' : function(event){
                        canvas.css('background-color', $(event.target).css('background-color'));
                    }, 
                    'mouseleave' : function(event){
                        canvas.css('background-color', '');
                    },
                    'click' : function(event) {
                        $('#message').text(`[${event.clientX}][${event.clientY}]/[${event.pageX}][${event.pageY}]/[${event.screenX}][${event.screenY}]`);
                        // 화면의 x,y 좌표에 따라 다른 값을 출력
                    }
                });

                colorsTr.append(td);
                // td.appendTo(colorsTr);                
            });

       
        });
    </script>
</body>
</html>
