<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <table id="lotto_table">
        <tr style="text-align: center;">
            <td colspan="6">
                <button id="btn">랜덤 숫자 추출기</button>
            </td>
        </tr>
    </table>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(function(){
            const table = $('#lotto_table');
            const btn = $('#btn');

            table.css({
                        textAlign :'center',
                        border: 'solid 1px',
                        width: '500px',
                        height: '500px'
                    });

            btn.on('click', function(){
                const numbers = selectWinningNumbers();

                const tr = $(`<tr></tr>`);
                numbers.forEach(function(number, idx) {
                    
                    const td = $(`<td>${number} </td>`);
                    tr.append(td);
                });

                table.append(tr);
            });

            function selectWinningNumbers() {

                const numbers = [];
                for (let i = 0; i < 6; i++) {
                    const number = Math.floor(Math.random() * 45 + 1);
                    numbers.push(number);
                    
                    for (let j = 0; j < i; j++) {
                        if (numbers[j] == numbers[i]) {
                            console.log('number equals');
                            i--;
                            numbers.pop([i]);
                            break;
                        }
                
                    }
                }

                return numbers;

            }

        });
    </script>
</body>
</html>
