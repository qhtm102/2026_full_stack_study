<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>변수 체험</title>
</head>

<body>

    <script>
        let name;           // 변수 만들기
        name = '김도끼';     // 변수에 값 저장
        let email = 'jdk@example.com';
        email = 'jjj@naver.com';    // 변수에 저장된 값 변경

        const juminBunho = '123456-1122334';
        // juminBunho = '345678-4422341'; // const 값은 변경 불가 (오류)

        console.log(name + ' ' + email + ' ' + juminBunho);

        let age;    
        console.log(age); // undefined : garbage 자료형이 결정되지 않음
        age = 10;   // 10이 저장되고 자료형이 결정됨 -> 10에 따라 정수형
        console.log(age); 
        age = "삼십"; // "삼십" 이 저장되고 자료형이 문자형으로 변경
        console.log(age);

        // Escape Sequence: 문자형 내부에 특수한 문자 표시하는 방법
        // enter : \n
        // tab : \t
        // "" : \"
        // '' : \'
        // \ : \\
        console.log("오늘은 날씨가  \"매우\" 덥습니다.");
        console.log("첫 번째 행.\n두 번째 행.");

        name = "장원영";
        age = 22;
        // 데이터와 문자열을 결합하는 방법 1.
        console.log(name + "님의 나이는 " + age + "세 입니다.")

        // 데이터와 문자열을 결합하는 방법 2. : template string
        console.log(`${name}님의 나이는 ${age}세 입니다.`)

        let isFemail = true;
        console.log(isFemail);
        isFemail = false;
        console.log(isFemail);

        // 형 변환
        let iNumber = 10;
        let sNumber = '10';
        console.log(iNumber + sNumber); // 자동 형변환 : iNumber를 문자형으로 변경
        console.log(iNumber * sNumber); // 자동 형변환 : sNumber를 수치형으로 변경

        // 권장
        console.log(iNumber + parseInt(sNumber)); // 강제 형변환 : sNumber를 정수형으로 변경
        console.log(iNumber + parseFloat(sNumber)); // 강제 형변환 : sNumber를 정수형으로 변경
        
        // 나머지와 나누기 연산
        console.log(10 / 3);
        console.log(10 % 3);    // 나머지 연산

    </script>

</body>

</html>
