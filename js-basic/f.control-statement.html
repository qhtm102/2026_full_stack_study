<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제어문 (선택문)</title>
</head>

<body>

    
    <script>
        // 0 ~ 100 사이의 정수 3개를 랜덤하게 추출해서 변수에 저장
        // 변수 이름은 각각 score1, score2, score3
        // 총점, 평균 계산해서 각각 변수에 저장 (total, average)
        // 평균 기준등급을 계산해서 변수에 저장 (grade) if-else 사용
        // 총점 평균 등급 출력
        let number1, number2, number3;
        let score1, score2, score3;
        
        number1 = Math.random() * 100;
        number2 = Math.random() * 100;
        number3 = Math.random() * 100;
        
        score1 = Math.round(number1);
        score2 = Math.round(number2);
        score3 = Math.round(number3);
        
        let total = score1 + score2 + score3;

        let average = total / 3;
   
        let grade;

        switch(Math.floor(average / 10)) { // Math.round() : 반올림, Math.floor() : 반내림, Math.ceil : 올림
            case 10:
            case  9: grade = 'A'; break;
            case  8: grade = "B"; break;
            case  7: grade = "C"; break;
            case  6: grade = "D"; break;
            default: grade = "F"; break;
        }

        document.write(`<h1 style="text-align:center">[총점 : ${total} || 평균 : ${average} || 등급 : ${grade}]</h1>`)
        console.log(`총점 : ${total} || 평균 : ${average} || 등급 : ${grade}`)
        
    </script>
</body>


</html>
