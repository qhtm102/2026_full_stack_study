<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제어문 (연습)</title>
</head>
<body>
    <script>
    // 가로 30 x 세로 20 박스 그리기

    // *********************
    // *                   *
    // *                   *
    // ....
    // *********************

    // <table> 사용 : * 한 개에 <td> 한개
    // 빈 공간은 <td>&nbsp;</td>
    
    document.write('<table>');
    for(let i = 1; i <= 20; i++) {

        document.write('<tr>');
        for(let j = 1; j <= 30; j++) {
            document.write('<td>');
            // document.write('*');

            if(i === 1 || i === 20){
                document.write('*');
            }
            else {
                if(j == 1 || j == 30){
                    document.write('*');
                }
                else {
                    document.write('&nbsp;');
                }
                
            }
           
            document.write('</td>');
        }
        
        document.write('</tr>');
    }

    document.write('</table>');
    </script>
</body>
</html>
