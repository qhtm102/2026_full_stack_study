<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윈도우 객체 연습</title>
</head>
<body>
        <div id="message"></div>

    <script>
    // 1. 모든 것은 window 객체에 포함 -> 생략 가능
    //    window.alert('hello');   
        alert('hello');  // window 객체는 생략가능

        // const message2 = document.querySelector('#message2');   // 아직 처리되지 않은 message2 사용하기 -> 반환 값 없음
        // message2.innerHTML = "<h3>확인해주세요</h3>";   // 오류1: 위에서 객체를 찾지 못했으므로 오류

        // 2-1.
        // window.onload = function(event){}
        window.addEventListener("load", function(event){    // 브라우저가 html 처리를 완료한 후 발생하는 이벤트 ( 이미지(파일) 다운로드 후 )
            const message2 = document.querySelector('#message2');
            message2.innerHTML += "<h3>확인해주세요1</h3>";   
        });

        // 2-2.
        window.document.addEventListener("DOMContentLoaded", function(event){    // 브라우저가 객체 트리 완성 후 발생하는
            const message2 = document.querySelector('#message2');
            message2.innerHTML += "<h3>확인해주세요2</h3>";   
        });


    </script>
    <hr>
    <div id="message2"></div>
</body>
</html>
