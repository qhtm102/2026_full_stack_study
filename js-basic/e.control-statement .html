<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제어문 (선택문)</title>
</head>

<body>

    
    <script>
        // 0 ~ 100 사이의 정수 3개를 랜덤하게 추출해서 변수에 저장
        // 변수 이름은 각각 score1, score2, score3
        // 총점, 평균 계산해서 각각 변수에 저장 (total, average)
        // 평균 기준등급을 계산해서 변수에 저장 (grade) if-else 사용
        // 총점 평균 등급 출력
        let number1, number2, number3;
        let score1, score2, score3;
        
        number1 = Math.random() * 100 + 1;
        number2 = Math.random() * 100 + 1;
        number3 = Math.random() * 100 + 1;
        
        score1 = Math.round(number1);
        score2 = Math.round(number2);
        score3 = Math.round(number3);
        
        let total = score1 + score2 + score3;

        let average = Math.round(total / 3);
   
        let grade;
        if(average >= 90) {
            grade = 'A';
        }
        else if(average >= 80) {
            grade = 'B';
        }
        else if(average >= 70) {
            grade = 'C';
        }
        else if(average >= 60) {
            grade = 'D';
        }
        else {
            grade = 'F';
        }

        console.log(`총점 : ${total} || 평균 : ${average} || 등급 : ${grade}`)

    </script>
</body>


</html>
