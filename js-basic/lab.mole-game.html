<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>두더지 사냥</title>
<style>
        table { margin: 0 auto; }
        img, #dashboard { width: 150px; height: 150px; border: solid 1px; }
        button { width: 49%; height: 50px; }
        #dashboard { text-align:center; font-size: 15pt; font-weight: bold; }
    </style>
</head>
<body>
    <h3 style="text-align: center;"> ㅁ두더지 게임 (이상진)ㅁ </h3>
    <table>
        <tr>
            <td><img></td>
            <td><img></td>
            <td><img></td>
            <th id="dashboard" rowspan="4">
                남은시간 : <span id="time" >0</span>
                <hr>
                점수 : <spane id="score">0</spane>
            </th>
        </tr>
        <tr>
            <td><img></td>
            <td><img></td>
            <td><img></td>            
        </tr>
        <tr>
            <td><img></td>
            <td><img></td>
            <td><img></td>
        </tr>
        <tr>
            <th colspan="3">
                <button id="btn-start">게임 시작</button>
                <button id="btn-stop">게임 종료</button>
            </th>
        </tr>
    </table>
    
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
        // window.addEventListener('load', (event)=>{
        
            const images = document.querySelectorAll('img');
            let score = 0;
            let timeRemain = 0;

            // const scoreDiv = document.querySelector('#score');
            const timeSpan = document.querySelector('#time');
            const scoreSpan = document.querySelector('#score');

            // for(let i=0; i<images.length; i++){}
            // for(let i in images){}
            // for(let image of images){}
            images.forEach((image, idx) => {
                image.src='images/hole.jpg';

                image.addEventListener('click', (event) => {
                    if(timerId == null) return; // 게임이 진행중이 아니라면, return으로 종료시키기
                    
                    // 현재 클릭된 이미지
                    const clickedImage = event.target;

                    // 현재 클릭된 이미지 객체의 이미지 파일이 mole2.png 라면 잡기 성공 
                    // if(clickedImage.src = 'images/mole2.png' = 0){ // src 속성에 mole2.png 문자열이 있는 위치 검사
                    if(clickedImage.src.indexOf('mole2.png') >= 0){ // src 속성에 mole2.png 문자열이 있는 위치 검사
                        clickedImage.src = 'images/dead.png'
                        
                        // 점수 로직
                        score += 1; // 점수 증가
                        scoreSpan.innerText = `${score}`; // 점수 표시
                    } 
                });
            });

            /////////////

            const startBtn = document.querySelector('#btn-start');
            const stopBtn = document.querySelector('#btn-stop');

            let timerId = null; // 두더지 표시 타이머
            let gameTimerId = null; // 게임 시간 타이머

            startBtn.addEventListener('click',(event)=>{
                if(timerId != null || gameTimerId != null) return;
                
                score = 0;  // 시작 전 점수 초기화
                // scoreDiv.innerText = `점수: ${score}`;
                scoreSpan.innerText = `${score}`;

                // 두더지 시간 타이머
                timerId = setInterval(function(){
                    
                    // 1. 두더지 표시 (출현)
                    // 1-1. 이미지 개수 범위에서 난수 발생 (0 ~ 9) 
                    const positions = Math.floor(Math.random()*images.length);
                    // 1-2. 선택된 위치의 이미지에 두더지 표시
                    images[positions].src = 'images/mole2.png';
                    
                    // 2. 0.5초 후 두더지 숨기기
                    setTimeout(function() {
                        images[positions].src = 'images/hole.jpg';
                    }, 500);

                }, 1000);

                // 게임 시간 초기화
                timeRemain = 10;
                timeSpan.innerText = `${timeRemain}`;

                // 게임 시간 관리 타이머
                gameTimerId = setInterval(function() {
                    timeRemain -= 1;
                    timeSpan.innerText = `${timeRemain}`;
                    if(timeRemain == 0){
                        stopGame();
                    }
                }, 1000);

            });

            stopBtn.addEventListener('click',(event)=>{
                if(timerId == null && gameTimerId == null) return;
                stopGame();
            });

            function stopGame() {
                clearInterval(timerId);
                timerId = null;
                clearInterval(gameTimerId);
                gameTimerId = null;
        }
        });
        
        
        
    </script>
</body>
</html>
