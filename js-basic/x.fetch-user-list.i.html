<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fetch 함수 연습</title>
</head>
<body>
    <button id="request-post">데이터 가져오기</button>
    <hr>
    <div id="message"></div>
    <script>
        window.addEventListener('load', function(event) {
            const btn = document.querySelector('#request-post');
            const div = document.querySelector('#message');

            btn.addEventListener('click', function(event) {
                
                fetch('https://jsonplaceholder.typicode.com/users')
                    .then(response => response.json()) // then : 앞의 실행이 끝나면 실행될 코드 지정, response.json() : 응답을 json으로 변환
                    .then(json => {
                        for (let i = 0; i < json.length; i++) {
                            div.innerHTML += 
                            `<h5>${json[i].id}. <a href='x.fetch-user-detail.i.html?id=${json[i].id}'>${json[i].name}</a></h5>`
                        }
                    });
            });
        });
    </script>
    
</body>
</html>
