<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 연습</title>
    <style>
        button{
            width: 100px;
            height: 50px;
            border: solid 1px;
            background-color: purple;
            color: white;
        }
    </style>
</head>
<body>

    <script>
        function randomRange(min, max) {
            const GAP = max - min;
            const selectedValue = Math.random() * GAP + min;

            return selectedValue;   // 함수를 종료하고 selectedValue를 호출한 곳으로 반환
        }
    </script>
    
    <button onclick="alert('눌러주셔서 감하합니다.')">버튼</button>
    <button onclick="alert(randomRange(10, 100))">난수</button>

</body>
</html>
