<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="request-photos">데이터 가져오기</button>
    <hr>
    <div id="message"></div>

    <script>
        window.addEventListener('load', function(event){


            const btn = document.querySelector('#request-photos');
            const div = document.querySelector('#message');

            btn.addEventListener('click', function(event){

                fetch('https://jsonplaceholder.typicode.com/photos')
                .then(response => response.json())
                .then(json => {
                    
                    for(let i=0; i<json.length; i++){
                        div.innerHTML = 
                            `<h3>${json[i].id}</h3><a href='x.fetch-photos-detail.html?id=${json[i].id}&title=${json[i].title}&url=${json[i].url}'><img src=${json[i].thumbnailUrl}></a>`;
                    }
                });
            });
        });
    </script>

</body>
</html>
