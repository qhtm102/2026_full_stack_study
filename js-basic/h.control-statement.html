<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제어문 - 반복문</title>
</head>
<body>
    
    <h2></h2>
    <script>
        // 1 ~ 100 까지의 합 계산, 출력
        // 1 ~ 100 까지의 (홀수)합 계산, 출력
        // 1 ~ 100 까지의 (짝수)합 계산, 출력
        
        let total = 0;
        // for (let i = 1; i < 101; i = i + 1) {
        // for (let i = 1; i < 101; i++) {  // i++ == i = i + 1
        // for (let i = 1; i < 101; ++i) {
        for (let i = 1; i < 101; i += 1) {
            total = total + i;
        }

        document.write(`<h2> 1부터 100까지의 합 : ${total} </h2>`);

        total = 0;
        // for (let i = 100; i > 0; i = i - 1) {
        // for (let i = 100; i > 0; i--) {
        // for (let i = 100; i > 0; --i) {
        for (let i = 100; i > 0; i -= 1) { // i -= 1 == i = i - 1
            total = total + i;
        }

        document.write(`<h2 style='color:blue;'> 100부터 1까지의 합 : ${total} </h2>`);
    </script>
</body>
</html>
