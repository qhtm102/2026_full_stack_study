<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 객체 연습</title>
</head>
<body>
    <!-- 
        1. 한국돈 krw를 입력
        2. 원 -> 달러 버튼 클릭
        3. 그 옆에 달러로 변환해 출력 
    -->

    <input type="text" id="won">
    <button id="won_to_dollar">원 -> 달러</button>
    <input type="text" id="dollar">


    <script>
        // 1. 찾기
        const btn1 = document.querySelector('#won_to_dollar');
        // 2. 사용하기
        btn1.addEventListener('click', function(event){
                const won = document.querySelector('#won');
                const wonV = parseInt(won.value);

                const dollar = document.querySelector('#dollar');
                dollar.value = wonV / 1526;
                
        });

    </script>
</body>
</html>
