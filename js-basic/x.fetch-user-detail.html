<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch 함수 연습</title>
</head>
<body>
    <div id="message"></div>
    <script>
        window.addEventListener('load', function(event) {

            const div = document.querySelector('#message');

            const qs = new URLSearchParams(location.search);
            const id = qs.get('id'); // ?...&id=10&... => id값인 10 반환

            const name = qs.get('name');
            const email = qs.get('email');
            const phone = qs.get('phone');
            const city = qs.get('city');
            
            fetch(`https://jsonplaceholder.typicode.com/users/${id}`)
                .then(function(response) { return response.json() } )
                .then(function(json) {
                    div.innerHTML = `<h3>${json.name}</h3>`;
                    div.innerHTML += `<h5>${json.email}</h5>`;
                    div.innerHTML += `<h4>${json.phone}</h4>`;
                    div.innerHTML += `<h4>${json.address.city}</h4>`;
                })
            
        });
    </script>
</body>
</html>
